<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Context Extraction: Project Mnemosyne</title>
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #f9fafb;
            --text-main: #111827;
            --text-sub: #6b7280;
            --border: #e5e7eb;
            --card-bg: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 600px;
            padding: 32px;
            position: relative;
        }
        .header {
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0 0 8px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header p {
            color: var(--text-sub);
            font-size: 0.95rem;
            margin: 0;
        }
        .progress {
            position: absolute;
            top: 32px;
            right: 32px;
            font-size: 0.85rem;
            color: var(--text-sub);
            background: #f3f4f6;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .selection-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }
        .option:hover {
            border-color: var(--primary);
            background-color: #f0f7ff;
        }
        .option.active {
            border-color: var(--primary);
            background-color: #f0f7ff;
            box-shadow: inset 0 0 0 1px var(--primary);
        }
        .option-number {
            width: 28px;
            height: 28px;
            background: #f3f4f6;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 600;
            margin-right: 16px;
            color: var(--text-sub);
        }
        .option.active .option-number {
            background: var(--primary);
            color: white;
        }
        .option-text {
            font-size: 1rem;
            font-weight: 500;
        }
        .something-else {
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .something-else label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-sub);
        }
        textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
            outline: none;
        }
        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .footer {
            margin-top: 32px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .btn {
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-skip {
            background: white;
            color: var(--text-sub);
            border: 1px solid var(--border);
        }
        .btn-skip:hover {
            background: #f9fafb;
        }
        .btn-next {
            background: var(--primary);
            color: white;
        }
        .btn-next:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="progress">Step 1 of 3</div>
        <div class="header">
            <h1>🧠 Project Mnemosyne Refinement</h1>
            <p>What is our primary focus for the next memory optimization sprint?</p>
        </div>

        <div class="selection-list">
            <div class="option active">
                <div class="option-number">1</div>
                <div class="option-text">Cross-Session Retrieval Speed</div>
            </div>
            <div class="option">
                <div class="option-number">2</div>
                <div class="option-text">Semantic Density Optimization</div>
            </div>
            <div class="option">
                <div class="option-number">3</div>
                <div class="option-text">Mobile-Laptop Knowledge Sync</div>
            </div>
            <div class="option">
                <div class="option-number">4</div>
                <div class="option-text">Hybrid Cloud-Local Balancing</div>
            </div>
        </div>

        <div class="something-else">
            <label for="comment">Something else (or add details)</label>
            <textarea id="comment" placeholder="Provide more context here..."></textarea>
        </div>

        <div class="footer">
            <button class="btn btn-skip">Skip</button>
            <button class="btn btn-next">Next Step →</button>
        </div>
    </div>
</body>
</html>
